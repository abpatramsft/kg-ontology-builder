<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KG Inference Agent — IndiGo Airlines</title>
<script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
<style>
/* ── Reset & Base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --surface:   #161922;
  --surface2:  #1e2130;
  --surface3:  #252840;
  --border:    #2d3148;
  --border-lt: #3a3f5c;
  --text:      #e1e4ed;
  --text-dim:  #8b90a5;
  --text-mute: #5c617a;
  --accent:    #6c8cff;
  --accent-bg: rgba(108,140,255,.07);
  --green:     #4ade80;
  --green-bg:  rgba(74,222,128,.07);
  --amber:     #fbbf24;
  --amber-bg:  rgba(251,191,36,.07);
  --purple:    #c084fc;
  --purple-bg: rgba(192,132,252,.07);
  --red:       #f87171;
  --red-bg:    rgba(248,113,113,.07);
  --cyan:      #22d3ee;
  --radius:    10px;
  --radius-sm: 6px;
  --font:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
}

/* ── App Shell — full-height two-column grid ───────────────── */
.app-shell {
  max-width: 1700px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.app-header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  text-align: center;
}

.app-body {
  display: grid;
  grid-template-columns: 500px 1fr;
  flex: 1;
  overflow: hidden;
}

.left-panel {
  overflow-y: auto;
  padding: 20px 20px 40px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.right-panel {
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ────────────────────────────────────────────────── */
.app-header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-bottom: 4px;
}
.app-header h1 span { color: var(--accent); }
.app-header p { color: var(--text-dim); font-size: .78rem; }

/* ── Input Area ────────────────────────────────────────────── */
.input-area { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }

.input-area textarea {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  color: var(--text);
  font-size: .95rem;
  font-family: var(--font);
  outline: none;
  transition: border-color .2s;
  resize: none;
  overflow: hidden;
  min-height: 46px;
  max-height: 200px;
  line-height: 1.5;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text-dim); }

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 12px 24px;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn:hover { opacity: .88; }
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── Sample Questions ──────────────────────────────────────── */
.samples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }

.samples button {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  color: var(--text-dim);
  font-size: .76rem;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font);
}
.samples button:hover {
  color: var(--accent); border-color: var(--accent); background: var(--accent-bg);
}

/* ── Timeline ──────────────────────────────────────────────── */
.timeline { display: none; margin-top: 8px; }
.timeline.visible { display: block; }

/* Status bar */
.status-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  font-size: .82rem;
  color: var(--text-dim);
}
.status-bar .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--amber);
  animation: pulse 1.2s infinite;
}
.status-bar.done .dot { background: var(--green); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.status-bar .elapsed {
  margin-left: auto; font-family: var(--mono); font-size: .78rem;
}

/* ═══════════════════════════════════════════════════════════
   Iteration Card — top-level accordion per step
   ═══════════════════════════════════════════════════════════ */
.iter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  animation: fadeSlide .35s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Iteration header — the clickable row */
.iter-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  cursor: pointer; user-select: none;
  transition: background .15s;
}
.iter-header:hover { background: var(--surface2); }

.iter-number {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .85rem;
  flex-shrink: 0;
  background: var(--accent-bg); color: var(--accent);
  border: 1px solid rgba(108,140,255,.15);
}
.iter-card.complete .iter-number {
  background: var(--green-bg); color: var(--green);
  border-color: rgba(74,222,128,.15);
}
.iter-card.running .iter-number {
  background: var(--amber-bg); color: var(--amber);
  border-color: rgba(251,191,36,.15);
  animation: pulse 1.2s infinite;
}

.iter-info { flex: 1; min-width: 0; }

.iter-title {
  font-size: .88rem; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}

.iter-summary {
  font-size: .78rem; color: var(--text-dim);
  margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Pills on the iteration header */
.iter-pills { display: flex; gap: 6px; flex-shrink: 0; }

.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px;
  border-radius: 12px;
  font-size: .68rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em;
}
.pill.graph  { background: var(--accent-bg); color: var(--accent); }
.pill.vector { background: var(--purple-bg); color: var(--purple); }
.pill.sql    { background: var(--amber-bg);  color: var(--amber);  }
.pill.error  { background: var(--red-bg);    color: var(--red);    }

.iter-chevron {
  color: var(--text-mute); font-size: .8rem; flex-shrink: 0;
  transition: transform .25s;
}
.iter-card.open .iter-chevron { transform: rotate(180deg); }

/* Iteration body — contains sub-steps */
.iter-body {
  display: none;
  padding: 0 18px 16px;
}
.iter-card.open .iter-body { display: block; }

/* ── Sub-step rows inside each iteration ──────────────────── */
.substep {
  position: relative;
  padding: 12px 0 12px 32px;
  border-top: 1px solid var(--border);
}
.substep:first-child { border-top: 1px solid var(--border); }

/* Vertical timeline connector line */
.substep::before {
  content: '';
  position: absolute;
  left: 11px; top: 0; bottom: 0;
  width: 2px;
  background: var(--border);
}
.substep:first-child::before { top: 50%; }
.substep:last-child::before  { bottom: 50%; }

/* Dot on the timeline */
.substep::after {
  content: '';
  position: absolute;
  left: 6px; top: 50%; transform: translateY(-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg);
}
.substep.thought::after { border-color: var(--accent); background: var(--accent-bg); }
.substep.action::after  { border-color: var(--amber);  background: var(--amber-bg);  }
.substep.observe::after { border-color: var(--purple); background: var(--purple-bg); }
.substep.error::after   { border-color: var(--red);    background: var(--red-bg);    }

.substep-tag {
  font-size: .68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 4px;
}
.substep.thought .substep-tag { color: var(--accent); }
.substep.action  .substep-tag { color: var(--amber);  }
.substep.observe .substep-tag { color: var(--purple); }
.substep.error   .substep-tag { color: var(--red);    }

.substep-text {
  font-size: .82rem; color: var(--text-dim); line-height: 1.55;
}
.substep-text.expanded { color: var(--text); }

/* Collapsible content within a substep */
.substep-detail {
  display: none;
  margin-top: 8px;
}
.substep.detail-open .substep-detail { display: block; }

.substep-preview {
  cursor: pointer;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.substep-preview:hover { color: var(--text); }
.substep.detail-open .substep-preview { display: none; }

.substep-detail pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: var(--mono);
  font-size: .76rem;
  line-height: 1.5;
  color: var(--text);
  overflow-x: auto;
  max-height: 340px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.substep-toggle {
  display: inline-block;
  margin-top: 6px;
  font-size: .72rem;
  color: var(--accent);
  cursor: pointer;
  user-select: none;
}
.substep-toggle:hover { text-decoration: underline; }

/* Tool badge inside substeps */
.tool-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: .7rem;
  font-family: var(--mono);
  font-weight: 600;
  margin-left: 4px;
}
.tool-badge.graph  { background: var(--accent-bg); color: var(--accent); }
.tool-badge.vector { background: var(--purple-bg); color: var(--purple); }
.tool-badge.sql    { background: var(--amber-bg);  color: var(--amber);  }

/* ═══════════════════════════════════════════════════════════
   Final Answer Card
   ═══════════════════════════════════════════════════════════ */
.answer-card {
  background: var(--surface);
  border: 1px solid var(--green);
  border-radius: var(--radius);
  padding: 22px;
  margin-top: 20px;
  animation: fadeSlide .4s ease;
  display: none;
}
.answer-card.visible { display: block; }

.answer-card h3 {
  color: var(--green);
  font-size: .82rem;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.answer-card .answer-text {
  font-size: .9rem; line-height: 1.75; white-space: pre-wrap;
}
.answer-card .answer-meta {
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: .76rem; color: var(--text-dim);
  display: flex; gap: 24px;
}
.answer-card .answer-meta span strong { color: var(--text); }

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ═══════════════════════════════════════════════════════════
   KG Panel (right column)
   ═══════════════════════════════════════════════════════════ */
.kg-panel {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.kg-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}

.kg-title {
  font-size: .8rem;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: .03em;
  text-transform: uppercase;
}

.kg-node-count {
  font-size: .7rem;
  color: var(--text-mute);
  font-family: var(--mono);
  margin-left: 6px;
}

.kg-spacer { flex: 1; }

.kg-status {
  font-size: .72rem;
  color: var(--amber);
  font-family: var(--mono);
  min-width: 120px;
  text-align: right;
}

.kg-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: .72rem;
  padding: 4px 10px;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
}
.kg-btn:hover { border-color: var(--accent); color: var(--accent); }

.kg-canvas {
  flex: 1;
  background: var(--bg);
  min-height: 0;   /* critical for flex child to shrink */
}

.kg-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-mute);
  font-size: .82rem;
  gap: 10px;
}

/* ── KG Legend ─────────────────────────────────────────────── */
.kg-legend {
  padding: 8px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.kg-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: .68rem;
  color: var(--text-dim);
}

.kg-legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Node Tooltip ──────────────────────────────────────────── */
.kg-tooltip {
  position: absolute;
  pointer-events: none;
  z-index: 9999;
  background: var(--surface2);
  border: 1px solid var(--border-lt);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: .76rem;
  color: var(--text);
  max-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,.55);
  opacity: 0;
  transition: opacity .15s;
  line-height: 1.5;
}
.kg-tooltip.visible { opacity: 1; }
.kg-tooltip .tt-label {
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 4px;
}
.kg-tooltip .tt-name {
  font-weight: 600;
  font-size: .85rem;
  margin-bottom: 4px;
  word-break: break-word;
}
.kg-tooltip .tt-desc {
  color: var(--text-dim);
  font-size: .72rem;
  word-break: break-word;
}
.kg-tooltip .tt-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: .62rem;
  font-weight: 600;
  margin-right: 4px;
}

/* ── Responsive: stack below 900px ─────────────────────────── */
@media (max-width: 900px) {
  body { overflow: auto; height: auto; }
  .app-shell { height: auto; }
  .app-body { grid-template-columns: 1fr; }
  .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
  .right-panel { height: 450px; }
}
</style>
</head>
<body>

<div class="app-shell">

  <div class="app-header">
    <h1><span>KG Inference Agent</span> — IndiGo Airlines</h1>
    <p>Unified ontology over Knowledge Graph &middot; Document Embeddings &middot; Structured DB</p>
  </div>

  <div class="app-body">

    <!-- ── Left: query + timeline ─────────────────────────── -->
    <div class="left-panel">

      <div class="input-area" style="margin-top:16px;">
        <textarea id="queryInput" placeholder="Ask a question about IndiGo Airlines data..."
                  autocomplete="off" rows="1"></textarea>
        <button class="btn" id="askBtn" onclick="submitQuestion()">Ask Agent</button>
      </div>

      <div class="samples">
        <button onclick="fillSample(this)">Give me a full travel history for our passenger Aarav Sharma — every flight he took, where he flew, how much he spent, what class he booked, and who the pilots were on his flight</button>
        <button onclick="fillSample(this)">Which aircraft had a bird strike recently, and what was the full operational fallout — the flight details, crew on board, maintenance triggered, and cost?</button>
        <button onclick="fillSample(this)">A crew member raised a fatigue concern about being assigned consecutive red-eye flights. Which flights were those, what were the actual departure and arrival times, and was the rest gap between them compliant with the 12-hour DGCA minimum?</button>
        <button onclick="fillSample(this)">What's causing our flight delays? Break down total delay minutes by airport, identify whether they're ATC, weather, or technical, and tell me which single flight had the worst delay this month and why</button>
        <button onclick="fillSample(this)">What was the total maintenance cost for aircraft AC003 across all recorded events, and what training actions were triggered by its engine inspections?</button>
      </div>

      <div class="timeline" id="timeline">
        <div class="status-bar" id="statusBar">
          <div class="dot"></div>
          <span id="statusText">Initializing...</span>
          <span class="elapsed" id="elapsed">0.0s</span>
        </div>
        <div id="steps"></div>
      </div>

      <div class="answer-card" id="answerCard">
        <h3>&#x2714;&#xFE0F; Final Answer</h3>
        <div class="answer-text" id="answerText"></div>
        <div class="answer-meta">
          <span><strong id="metaSteps">0</strong> tool calls</span>
          <span><strong id="metaTime">0.0</strong>s elapsed</span>
          <span><strong id="metaIter">0</strong> iterations</span>
        </div>
      </div>

    </div>

    <!-- ── Right: Knowledge Graph panel ───────────────────── -->
    <div class="right-panel">
      <div class="kg-panel">
        <div class="kg-toolbar">
          <span class="kg-title">Knowledge Graph</span>
          <span class="kg-node-count" id="kgNodeCount"></span>
          <div class="kg-spacer"></div>
          <span class="kg-status" id="kgStatus"></span>
          <button class="kg-btn" id="kgResetBtn" onclick="clearHighlights()">Reset View</button>
          <button class="kg-btn" id="kgFitBtn" onclick="if(cy) cy.fit(undefined, 30)">Fit All</button>
        </div>
        <div id="cy" class="kg-canvas">
          <div class="kg-loading" id="kgLoading">Loading Knowledge Graph...</div>
        </div>
        <div class="kg-legend" id="kgLegend"></div>
      </div>
    </div>
    <div class="kg-tooltip" id="kgTooltip"></div>

  </div><!-- /.app-body -->
</div><!-- /.app-shell -->

<script>
/* ══════════════════════════════════════════════════════════════
   Hierarchical Iteration UI — groups thought/action/observation
   into collapsible per-iteration cards
   ══════════════════════════════════════════════════════════════ */

const $ = s => document.querySelector(s);
let startTime = 0, timerInterval = null, eventSource = null;
let stepCount = 0;

/* Graph state */
let cy = null;
let highlightedNodeIds = new Set();

/* Iteration state: track current iteration card & its body */
const iterations = {};          // { iterNum: { card, body, toolName, complete } }
let currentIter = 0;

function getOrCreateIteration(num) {
  if (iterations[num]) return iterations[num];

  const card = document.createElement('div');
  card.className = 'iter-card running';
  card.dataset.iter = num;

  const header = document.createElement('div');
  header.className = 'iter-header';

  const numEl = document.createElement('div');
  numEl.className = 'iter-number';
  numEl.textContent = num;

  const info = document.createElement('div');
  info.className = 'iter-info';

  const title = document.createElement('div');
  title.className = 'iter-title';
  title.textContent = `Step ${num}`;

  const summary = document.createElement('div');
  summary.className = 'iter-summary';
  summary.textContent = 'Thinking...';

  info.appendChild(title);
  info.appendChild(summary);

  const pills = document.createElement('div');
  pills.className = 'iter-pills';

  const chevron = document.createElement('span');
  chevron.className = 'iter-chevron';
  chevron.innerHTML = '&#x25BC;';

  header.appendChild(numEl);
  header.appendChild(info);
  header.appendChild(pills);
  header.appendChild(chevron);

  header.onclick = () => card.classList.toggle('open');

  const body = document.createElement('div');
  body.className = 'iter-body';

  card.appendChild(header);
  card.appendChild(body);
  $('#steps').appendChild(card);

  // Auto-expand newest, collapse previous
  if (currentIter && iterations[currentIter]) {
    iterations[currentIter].card.classList.remove('open', 'running');
    iterations[currentIter].card.classList.add('complete');
  }
  card.classList.add('open');
  currentIter = num;

  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  iterations[num] = { card, body, pills, summary, title, toolName: null, complete: false };
  return iterations[num];
}

function addSubstep(iter, type, content, detailHtml) {
  const el = document.createElement('div');
  el.className = `substep ${type}`;

  const tag = document.createElement('div');
  tag.className = 'substep-tag';
  tag.textContent = type === 'thought' ? 'Thought' :
                    type === 'action'  ? 'Action' :
                    type === 'observe' ? 'Observation' : 'Error';
  el.appendChild(tag);

  // Short preview line
  const truncated = content.length > 200 ? content.substring(0, 200) + '...' : content;
  const needsExpand = content.length > 200 || detailHtml;

  const preview = document.createElement('div');
  preview.className = 'substep-text substep-preview';
  preview.textContent = truncated;
  el.appendChild(preview);

  if (needsExpand) {
    const detail = document.createElement('div');
    detail.className = 'substep-detail';
    if (detailHtml) {
      detail.innerHTML = detailHtml;
    } else {
      detail.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
    }
    el.appendChild(detail);

    const toggle = document.createElement('span');
    toggle.className = 'substep-toggle';
    toggle.textContent = 'Show more';
    toggle.onclick = () => {
      const isOpen = el.classList.toggle('detail-open');
      toggle.textContent = isOpen ? 'Show less' : 'Show more';
    };
    el.appendChild(toggle);

    preview.onclick = () => {
      el.classList.add('detail-open');
      toggle.textContent = 'Show less';
    };
  }

  iter.body.appendChild(el);
}

/* ── Fill sample ───────────────────────────────────────────── */
function fillSample(btn) {
  $('#queryInput').value = btn.textContent;
  autoResize($('#queryInput'));
  $('#queryInput').focus();
}

/* ── Submit ────────────────────────────────────────────────── */
function submitQuestion() {
  const q = $('#queryInput').value.trim();
  if (!q) return;

  resetUI();
  $('#timeline').classList.add('visible');
  $('#askBtn').disabled = true;
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 100);

  const url = `/api/ask?q=${encodeURIComponent(q)}`;
  eventSource = new EventSource(url);

  eventSource.addEventListener('status', e => {
    const d = JSON.parse(e.data);
    $('#statusText').textContent = d.message;
  });

  eventSource.addEventListener('thought', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);
    iter.summary.textContent = d.thought.substring(0, 120) + (d.thought.length > 120 ? '...' : '');
    addSubstep(iter, 'thought', d.thought, null);
  });

  eventSource.addEventListener('action', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);
    iter.toolName = d.tool;
    stepCount++;

    // Add pill to header
    const pillClass = toolBadgeClass(d.tool);
    const pill = document.createElement('span');
    pill.className = `pill ${pillClass}`;
    pill.textContent = d.tool.replace(/_tool$/, '').replace(/_/g, ' ');
    iter.pills.appendChild(pill);

    // Update title with tool info
    iter.title.innerHTML = `Step ${d.iteration} <span class="tool-badge ${pillClass}">${escapeHtml(d.tool)}</span>`;

    const inputStr = JSON.stringify(d.action_input, null, 2);
    const detailHtml = `<pre>${syntaxHighlight(inputStr)}</pre>`;
    addSubstep(iter, 'action', `${d.tool} → ${JSON.stringify(d.action_input)}`, detailHtml);
  });

  eventSource.addEventListener('observation', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);

    let formatted = d.observation;
    try { formatted = JSON.stringify(JSON.parse(d.observation), null, 2); } catch(_){}
    const detailHtml = `<pre>${escapeHtml(formatted)}</pre>`;
    addSubstep(iter, 'observe', d.observation, detailHtml);

    // Mark this iteration complete
    iter.card.classList.remove('running');
    iter.card.classList.add('complete');
    iter.complete = true;
  });

  eventSource.addEventListener('graph_highlight', e => {
    const d = JSON.parse(e.data);
    applyHighlight(d);
  });

  eventSource.addEventListener('graph_traversal_path', e => {
    const d = JSON.parse(e.data);
    showTraversalPath(d.node_names);
  });

  eventSource.addEventListener('parse_error', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);

    const pill = document.createElement('span');
    pill.className = 'pill error';
    pill.textContent = 'parse error';
    iter.pills.appendChild(pill);

    addSubstep(iter, 'error', d.error, null);
  });

  eventSource.addEventListener('error', e => {
    try {
      const d = JSON.parse(e.data);
      addSubstep(getOrCreateIteration(currentIter || 1), 'error', d.message, null);
    } catch(_){}
  });

  eventSource.addEventListener('final_answer', e => {
    const d = JSON.parse(e.data);
    // Collapse the last iteration
    if (currentIter && iterations[currentIter]) {
      iterations[currentIter].card.classList.remove('open', 'running');
      iterations[currentIter].card.classList.add('complete');
    }
    showAnswer(d.answer, d.total_steps, d.iterations);
  });

  eventSource.addEventListener('done', () => finish());
  eventSource.onerror = () => finish();
}

/* ── Helpers ───────────────────────────────────────────────── */
function resetUI() {
  $('#steps').innerHTML = '';
  $('#answerCard').classList.remove('visible');
  $('#statusBar').classList.remove('done');
  $('#statusText').textContent = 'Initializing...';
  $('#elapsed').textContent = '0.0s';
  stepCount = 0;
  currentIter = 0;
  Object.keys(iterations).forEach(k => delete iterations[k]);
  if (timerInterval) clearInterval(timerInterval);
  if (eventSource) { eventSource.close(); eventSource = null; }
  clearHighlights();
  setKgStatus('');
}

function updateTimer() {
  $('#elapsed').textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
}

function finish() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  clearInterval(timerInterval);
  updateTimer();
  $('#statusBar').classList.add('done');
  $('#statusText').textContent = 'Complete';
  $('#askBtn').disabled = false;
}

function showAnswer(text, steps, iters) {
  $('#answerText').textContent = text;
  $('#metaSteps').textContent = steps;
  $('#metaTime').textContent = ((Date.now() - startTime) / 1000).toFixed(1);
  $('#metaIter').textContent = iters;
  $('#answerCard').classList.add('visible');
  setTimeout(() => $('#answerCard').scrollIntoView({ behavior: 'smooth', block: 'end' }), 150);
}

function toolBadgeClass(tool) {
  if (tool.includes('graph'))  return 'graph';
  if (tool.includes('vector')) return 'vector';
  if (tool.includes('sql'))    return 'sql';
  return '';
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function syntaxHighlight(json) {
  return escapeHtml(json)
    .replace(/"([^"]+)":/g, '<span style="color:var(--cyan)">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span style="color:var(--green)">"$1"</span>');
}

function setKgStatus(msg) {
  const el = $('#kgStatus');
  if (el) el.textContent = msg;
}

/* ── Auto-resize textarea ──────────────────────────────────── */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}
$('#queryInput').addEventListener('input', function() { autoResize(this); });

$('#queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !$('#askBtn').disabled) {
    e.preventDefault();
    submitQuestion();
  }
});

/* ══════════════════════════════════════════════════════════════
   Knowledge Graph Visualization — Cytoscape.js
   ══════════════════════════════════════════════════════════════ */

const NODE_COLORS = {
  DomainEntity: '#6c8cff',
  Concept:      '#c084fc',
  Document:     '#4ade80',
  Subject:      '#22d3ee',
  Object:       '#fbbf24',
};

const EDGE_COLORS = {
  FK:              '#4a5070',
  SEMANTIC:        '#4a5070',
  HAS_CONCEPT:     '#7060c0',
  RELATED_CONCEPT: '#5050a0',
  MENTIONS:        '#3a6040',
  RELATES_TO:      '#406060',
  CORRESPONDS_TO:  '#6c8cff',
};

const VISIBLE_LABELS = new Set(['DomainEntity', 'Subject', 'Document']);
const NODE_LABELS = [...VISIBLE_LABELS];

async function initKnowledgeGraph() {
  try {
    const resp = await fetch('/api/graph');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    const elements = buildCytoscapeElements(data);
    const visibleNodes = elements.filter(e => e.data && !e.data.source && VISIBLE_LABELS.has(e.data.label)).length;
    const visibleEdges = elements.filter(e => e.data && e.data.source).length;
    renderCytoscape(elements, visibleNodes, visibleEdges);
  } catch (err) {
    console.error('KG load failed:', err);
    const canvas = $('#cy');
    canvas.innerHTML = `<div class="kg-loading" style="color:var(--red)">Graph unavailable: ${escapeHtml(err.message)}</div>`;
  }
}

/* Edge line-style map for visual differentiation */
const EDGE_LINE_STYLE = {
  FK:              'solid',
  SEMANTIC:        'dashed',
  HAS_CONCEPT:     'dashed',
  RELATED_CONCEPT: 'dashed',
  MENTIONS:        'solid',
  RELATES_TO:      'solid',
  CORRESPONDS_TO:  'solid',
};

function buildCytoscapeElements(data) {
  /* Pre-compute degree for each node to scale size */
  const degreeMap = {};
  (data.edges || []).forEach(e => {
    const s = String(e.source), t = String(e.target);
    degreeMap[s] = (degreeMap[s] || 0) + 1;
    degreeMap[t] = (degreeMap[t] || 0) + 1;
  });

  const nodes = (data.nodes || []).filter(n => n.id && VISIBLE_LABELS.has(n.label || 'Unknown')).map(n => {
    const deg = degreeMap[String(n.id)] || 0;
    return {
      data: {
        id:          String(n.id),
        label:       n.label || 'Unknown',
        name:        n.name  || '',
        description: n.description || '',
        domain:      n.domain || '',
        node_type:   n.node_type || '',
        bgColor:     NODE_COLORS[n.label] || '#888888',
        displayName: (n.name || '').substring(0, 26),
        degree:      deg,
      }
    };
  });

  const nodeIds = new Set(nodes.map(n => n.data.id));

  const edges = (data.edges || []).filter(e => {
    return e.source && e.target && nodeIds.has(String(e.source)) && nodeIds.has(String(e.target));
  }).map((e, i) => ({
    data: {
      id:        `e_${i}`,
      source:    String(e.source),
      target:    String(e.target),
      type:      e.type || '',
      edgeColor: EDGE_COLORS[e.type] || '#3a3f5c',
      lineStyle: EDGE_LINE_STYLE[e.type] || 'solid',
      edgeLabel: (e.type || '').replace(/_/g, ' '),
    }
  }));

  return [...nodes, ...edges];
}

function renderCytoscape(elements, nodeCount, edgeCount) {
  // Remove loading placeholder
  const loadingEl = $('#kgLoading');
  if (loadingEl) loadingEl.remove();

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements:  elements,

    style: [
      /* ── Base node ── */
      {
        selector: 'node',
        style: {
          'background-color':   'data(bgColor)',
          'background-opacity': 0.85,
          'label':              'data(displayName)',
          'color':              '#d0d4e0',
          'font-size':          '9px',
          'font-family':        'Inter, sans-serif',
          'font-weight':        500,
          'text-valign':        'bottom',
          'text-halign':        'center',
          'text-margin-y':      5,
          'text-max-width':     '90px',
          'text-wrap':          'ellipsis',
          /* Degree-mapped sizing: min 22, max 48 */
          'width':              'mapData(degree, 0, 20, 22, 48)',
          'height':             'mapData(degree, 0, 20, 22, 48)',
          'border-width':       2,
          'border-color':       'data(bgColor)',
          'border-opacity':     0.5,
          'text-outline-color': '#0f1117',
          'text-outline-width': 2,
          /* Subtle outer glow via overlay */
          'overlay-color':      'data(bgColor)',
          'overlay-padding':    3,
          'overlay-opacity':    0,
          'transition-property':       'width, height, border-width, border-color, opacity, overlay-opacity',
          'transition-duration':       '0.2s',
          'transition-timing-function': 'ease-out',
        }
      },
      /* Hovered node — subtle grow & glow */
      {
        selector: 'node:active, node.hover',
        style: {
          'overlay-opacity':  0.12,
          'border-opacity':   1,
          'border-width':     3,
          'z-index':          900,
        }
      },
      /* ── Base edge ── */
      {
        selector: 'edge',
        style: {
          'line-color':         'data(edgeColor)',
          'line-style':         'data(lineStyle)',
          'target-arrow-color': 'data(edgeColor)',
          'target-arrow-shape': 'triangle',
          'arrow-scale':        0.6,
          'width':              1.2,
          'curve-style':        'bezier',
          'opacity':            0.35,
          'transition-property': 'opacity, width, line-color',
          'transition-duration': '0.2s',
        }
      },
      /* Edge label shown on hover via class */
      {
        selector: 'edge.show-label',
        style: {
          'label':              'data(edgeLabel)',
          'font-size':          '7px',
          'font-family':        'Inter, sans-serif',
          'color':              '#8b90a5',
          'text-rotation':      'autorotate',
          'text-outline-color': '#0f1117',
          'text-outline-width': 1.5,
          'text-margin-y':      -8,
          'opacity':            0.75,
          'width':              2,
        }
      },
      /* ── Highlighted node — white ring, larger ── */
      {
        selector: 'node.highlighted',
        style: {
          'border-color':       '#ffffff',
          'border-width':       3,
          'border-opacity':     1,
          'width':              34,
          'height':             34,
          'z-index':            999,
          'font-size':          '10px',
          'font-weight':        'bold',
          'text-outline-width': 2.5,
          'color':              '#ffffff',
          'overlay-opacity':    0.15,
          'overlay-color':      '#ffffff',
        }
      },
      /* Highlighted edge (neighbor of highlighted node) */
      {
        selector: 'edge.highlighted-edge',
        style: {
          'opacity':            0.85,
          'width':              2.5,
          'z-index':            998,
        }
      },
      /* ── Dimmed — fade out non-highlighted ── */
      {
        selector: 'node.dimmed',
        style: { 'opacity': 0.08 }
      },
      {
        selector: 'edge.dimmed',
        style: { 'opacity': 0.03 }
      },
      /* ── Class-level highlight ── */
      {
        selector: 'node.class-highlighted',
        style: {
          'border-color': '#ffffff',
          'border-width': 2,
          'border-opacity': 1,
          'opacity':      1,
        }
      },
      /* ── Traversal path — amber glow ── */
      {
        selector: 'node.traversal',
        style: {
          'background-color': '#fbbf24',
          'border-color':     '#fbbf24',
          'border-width':     3,
          'border-opacity':   1,
          'width':            30,
          'height':           30,
          'color':            '#ffffff',
          'font-size':        '9px',
          'font-weight':      'bold',
          'overlay-opacity':  0.18,
          'overlay-color':    '#fbbf24',
        }
      },
      {
        selector: 'edge.traversal-edge',
        style: {
          'line-color':         '#fbbf24',
          'target-arrow-color': '#fbbf24',
          'opacity':            0.85,
          'width':              2.5,
          'line-style':         'solid',
        }
      },
      /* ── Neighbor highlight on click ── */
      {
        selector: 'node.neighbor',
        style: {
          'opacity':        1,
          'border-color':   '#ffffff',
          'border-width':   2,
          'border-opacity': 0.6,
        }
      },
    ],

    layout: {
      name:            'cose',
      animate:         true,
      animationDuration: 1200,
      randomize:       true,
      nodeRepulsion:   () => 800000,
      idealEdgeLength: () => 350,
      edgeElasticity:  () => 0.005,
      gravity:         0.008,
      gravityRange:    1.5,
      nestingFactor:   1.2,
      numIter:         3000,
      coolingFactor:   0.97,
      minTemp:         1.0,
      initialTemp:     2000,
      nodeDimensionsIncludeLabels: true,
      padding:         80,
      nodeOverlap:     80,
      componentSpacing: 250,
      fit:             true,
    },

    minZoom: 0.03,
    maxZoom: 8,
    wheelSensitivity: 0.3,
    pixelRatio: 'auto',
  });

  /* ── Rich tooltip on node hover ───────────────────────── */
  const tooltip = $('#kgTooltip');

  cy.on('mouseover', 'node', e => {
    const node = e.target;
    const d = node.data();
    node.addClass('hover');

    // Show connected edges' labels
    node.connectedEdges().addClass('show-label');

    // Build tooltip HTML
    const color = d.bgColor || '#888';
    tooltip.innerHTML = `
      <div class="tt-label" style="color:${color}">
        <span class="tt-badge" style="background:${color}22;color:${color}">${escapeHtml(d.label)}</span>
        ${d.domain ? escapeHtml(d.domain) : ''}
      </div>
      <div class="tt-name">${escapeHtml(d.name)}</div>
      ${d.description ? `<div class="tt-desc">${escapeHtml(d.description).substring(0, 160)}${d.description.length > 160 ? '...' : ''}</div>` : ''}
    `;
    tooltip.classList.add('visible');
    setKgStatus(`${d.label}: ${d.name}`);
  });

  cy.on('mousemove', 'node', e => {
    const { x, y } = e.renderedPosition || e.position;
    const rect = cy.container().getBoundingClientRect();
    tooltip.style.left = (rect.left + x + 16) + 'px';
    tooltip.style.top  = (rect.top  + y - 10) + 'px';
  });

  cy.on('mouseout', 'node', e => {
    e.target.removeClass('hover');
    e.target.connectedEdges().removeClass('show-label');
    tooltip.classList.remove('visible');
    setKgStatus('');
  });

  /* ── Click node → highlight neighborhood ─────────────── */
  cy.on('tap', 'node', e => {
    const node = e.target;
    const neighborhood = node.closedNeighborhood();

    // If already highlighted, clear
    if (node.hasClass('highlighted')) {
      clearHighlights();
      return;
    }

    clearHighlights();
    cy.elements().addClass('dimmed');
    neighborhood.removeClass('dimmed');
    node.addClass('highlighted');
    neighborhood.nodes().not(node).addClass('neighbor');
    neighborhood.edges().addClass('highlighted-edge');

    setKgStatus(`${node.data('label')}: ${node.data('name')} — ${neighborhood.nodes().length - 1} connections`);
  });

  /* Click background → clear highlights */
  cy.on('tap', e => {
    if (e.target === cy) clearHighlights();
  });

  /* ── Hover edge → show label ─────────────────────────── */
  cy.on('mouseover', 'edge', e => e.target.addClass('show-label'));
  cy.on('mouseout',  'edge', e => e.target.removeClass('show-label'));

  // Update node count badge
  const countEl = $('#kgNodeCount');
  if (countEl) countEl.textContent = `${nodeCount} nodes · ${edgeCount} edges`;

  buildLegend();
}

/* ── Graph highlight on agent step ────────────────────────── */
function applyHighlight(h) {
  if (!cy) return;

  const { highlight_type, node_names, node_labels } = h;
  clearHighlights();

  if (highlight_type === 'named_nodes' && node_names && node_names.length > 0) {
    // Build selector matching any of the given names
    const sel = node_names
      .filter(Boolean)
      .map(name => `node[name = "${name.replace(/"/g, '\\"')}"]`)
      .join(', ');
    const targets = cy.$(sel);

    if (targets.length > 0) {
      cy.elements().addClass('dimmed');
      targets.removeClass('dimmed').addClass('highlighted');
      targets.connectedEdges().removeClass('dimmed');
      highlightedNodeIds = new Set(targets.map(n => n.id()));

      cy.animate({
        fit: { eles: targets.add(targets.connectedEdges()), padding: 80 },
        duration: 500,
        easing: 'ease-in-out-quad',
      });
    }
    setKgStatus(`Querying: ${node_names.filter(Boolean).join(', ')}`);

  } else if (highlight_type === 'label_class' && node_labels && node_labels.length > 0) {
    const sel = node_labels.map(lbl => `node[label = "${lbl}"]`).join(', ');
    const targets = cy.$(sel);
    cy.elements().addClass('dimmed');
    targets.removeClass('dimmed').addClass('class-highlighted');
    setKgStatus(`Scanning: ${node_labels.join(', ')} nodes`);

  } else if (highlight_type === 'schema_scan') {
    cy.nodes().addClass('class-highlighted');
    setKgStatus('Schema scan');
    setTimeout(() => {
      cy.nodes().removeClass('class-highlighted');
      setKgStatus('');
    }, 1400);

  } else if (highlight_type === 'path_query' && node_names && node_names.length > 0) {
    const sel = node_names
      .filter(Boolean)
      .map(name => `node[name = "${name.replace(/"/g, '\\"')}"]`)
      .join(', ');
    const targets = cy.$(sel);
    cy.elements().addClass('dimmed');
    targets.removeClass('dimmed').addClass('highlighted');
    targets.connectedEdges().removeClass('dimmed');
    setKgStatus(`Path: ${node_names.filter(Boolean).join(' → ')}`);

  } else if (highlight_type === 'custom_query') {
    setKgStatus('Custom Cypher query');
  }
}

function clearHighlights() {
  if (!cy) return;
  cy.elements().removeClass('highlighted dimmed class-highlighted traversal traversal-edge highlighted-edge neighbor show-label hover');
  highlightedNodeIds = new Set();
  const tooltip = $('#kgTooltip');
  if (tooltip) tooltip.classList.remove('visible');
}

/* ── Final traversal path overlay ─────────────────────────── */
function showTraversalPath(nodeNames) {
  if (!cy || !nodeNames || nodeNames.length === 0) return;
  clearHighlights();

  const sel = nodeNames
    .filter(Boolean)
    .map(name => `node[name = "${name.replace(/"/g, '\\"')}"]`)
    .join(', ');
  const touched = cy.$(sel);

  cy.elements().addClass('dimmed');
  touched.removeClass('dimmed').addClass('traversal');

  // Highlight edges that connect two traversal nodes
  touched.connectedEdges().filter(e =>
    touched.has(e.source()) && touched.has(e.target())
  ).removeClass('dimmed').addClass('traversal-edge');

  if (touched.length > 0) {
    cy.animate({ fit: { eles: touched, padding: 60 }, duration: 700 });
  }

  setKgStatus(`Traversal path: ${nodeNames.filter(Boolean).length} nodes`);
}

/* ── Legend ────────────────────────────────────────────────── */
function buildLegend() {
  const legend = $('#kgLegend');
  if (!legend) return;
  legend.innerHTML = '';
  NODE_LABELS.forEach(label => {
    const item = document.createElement('div');
    item.className = 'kg-legend-item';
    const dot = document.createElement('div');
    dot.className = 'kg-legend-dot';
    dot.style.background = NODE_COLORS[label];
    const text = document.createElement('span');
    text.textContent = label;
    item.appendChild(dot);
    item.appendChild(text);
    legend.appendChild(item);
  });
}

/* ── Init on page load ─────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', initKnowledgeGraph);
</script>
