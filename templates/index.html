<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KG Inference Agent — IndiGo Airlines</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --surface:   #161922;
  --surface2:  #1e2130;
  --surface3:  #252840;
  --border:    #2d3148;
  --border-lt: #3a3f5c;
  --text:      #e1e4ed;
  --text-dim:  #8b90a5;
  --text-mute: #5c617a;
  --accent:    #6c8cff;
  --accent-bg: rgba(108,140,255,.07);
  --green:     #4ade80;
  --green-bg:  rgba(74,222,128,.07);
  --amber:     #fbbf24;
  --amber-bg:  rgba(251,191,36,.07);
  --purple:    #c084fc;
  --purple-bg: rgba(192,132,252,.07);
  --red:       #f87171;
  --red-bg:    rgba(248,113,113,.07);
  --cyan:      #22d3ee;
  --radius:    10px;
  --radius-sm: 6px;
  --font:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ────────────────────────────────────────────────── */
.app {
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

header { text-align: center; margin-bottom: 36px; }

header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-bottom: 6px;
}
header h1 span { color: var(--accent); }
header p { color: var(--text-dim); font-size: .82rem; }

/* ── Input Area ────────────────────────────────────────────── */
.input-area { display: flex; gap: 10px; margin-bottom: 12px; }

.input-area input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  color: var(--text);
  font-size: .95rem;
  font-family: var(--font);
  outline: none;
  transition: border-color .2s;
}
.input-area input:focus { border-color: var(--accent); }
.input-area input::placeholder { color: var(--text-dim); }

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 12px 24px;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn:hover { opacity: .88; }
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── Sample Questions ──────────────────────────────────────── */
.samples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }

.samples button {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  color: var(--text-dim);
  font-size: .76rem;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font);
}
.samples button:hover {
  color: var(--accent); border-color: var(--accent); background: var(--accent-bg);
}

/* ── Timeline ──────────────────────────────────────────────── */
.timeline { display: none; margin-top: 8px; }
.timeline.visible { display: block; }

/* Status bar */
.status-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  font-size: .82rem;
  color: var(--text-dim);
}
.status-bar .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--amber);
  animation: pulse 1.2s infinite;
}
.status-bar.done .dot { background: var(--green); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.status-bar .elapsed {
  margin-left: auto; font-family: var(--mono); font-size: .78rem;
}

/* ═══════════════════════════════════════════════════════════
   Iteration Card — top-level accordion per step
   ═══════════════════════════════════════════════════════════ */
.iter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  animation: fadeSlide .35s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Iteration header — the clickable row */
.iter-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  cursor: pointer; user-select: none;
  transition: background .15s;
}
.iter-header:hover { background: var(--surface2); }

.iter-number {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .85rem;
  flex-shrink: 0;
  background: var(--accent-bg); color: var(--accent);
  border: 1px solid rgba(108,140,255,.15);
}
.iter-card.complete .iter-number {
  background: var(--green-bg); color: var(--green);
  border-color: rgba(74,222,128,.15);
}
.iter-card.running .iter-number {
  background: var(--amber-bg); color: var(--amber);
  border-color: rgba(251,191,36,.15);
  animation: pulse 1.2s infinite;
}

.iter-info { flex: 1; min-width: 0; }

.iter-title {
  font-size: .88rem; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}

.iter-summary {
  font-size: .78rem; color: var(--text-dim);
  margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Pills on the iteration header */
.iter-pills { display: flex; gap: 6px; flex-shrink: 0; }

.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px;
  border-radius: 12px;
  font-size: .68rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em;
}
.pill.graph  { background: var(--accent-bg); color: var(--accent); }
.pill.vector { background: var(--purple-bg); color: var(--purple); }
.pill.sql    { background: var(--amber-bg);  color: var(--amber);  }
.pill.error  { background: var(--red-bg);    color: var(--red);    }

.iter-chevron {
  color: var(--text-mute); font-size: .8rem; flex-shrink: 0;
  transition: transform .25s;
}
.iter-card.open .iter-chevron { transform: rotate(180deg); }

/* Iteration body — contains sub-steps */
.iter-body {
  display: none;
  padding: 0 18px 16px;
}
.iter-card.open .iter-body { display: block; }

/* ── Sub-step rows inside each iteration ──────────────────── */
.substep {
  position: relative;
  padding: 12px 0 12px 32px;
  border-top: 1px solid var(--border);
}
.substep:first-child { border-top: 1px solid var(--border); }

/* Vertical timeline connector line */
.substep::before {
  content: '';
  position: absolute;
  left: 11px; top: 0; bottom: 0;
  width: 2px;
  background: var(--border);
}
.substep:first-child::before { top: 50%; }
.substep:last-child::before  { bottom: 50%; }

/* Dot on the timeline */
.substep::after {
  content: '';
  position: absolute;
  left: 6px; top: 50%; transform: translateY(-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg);
}
.substep.thought::after { border-color: var(--accent); background: var(--accent-bg); }
.substep.action::after  { border-color: var(--amber);  background: var(--amber-bg);  }
.substep.observe::after { border-color: var(--purple); background: var(--purple-bg); }
.substep.error::after   { border-color: var(--red);    background: var(--red-bg);    }

.substep-tag {
  font-size: .68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 4px;
}
.substep.thought .substep-tag { color: var(--accent); }
.substep.action  .substep-tag { color: var(--amber);  }
.substep.observe .substep-tag { color: var(--purple); }
.substep.error   .substep-tag { color: var(--red);    }

.substep-text {
  font-size: .82rem; color: var(--text-dim); line-height: 1.55;
}
.substep-text.expanded { color: var(--text); }

/* Collapsible content within a substep */
.substep-detail {
  display: none;
  margin-top: 8px;
}
.substep.detail-open .substep-detail { display: block; }

.substep-preview {
  cursor: pointer;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.substep-preview:hover { color: var(--text); }
.substep.detail-open .substep-preview { display: none; }

.substep-detail pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: var(--mono);
  font-size: .76rem;
  line-height: 1.5;
  color: var(--text);
  overflow-x: auto;
  max-height: 340px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.substep-toggle {
  display: inline-block;
  margin-top: 6px;
  font-size: .72rem;
  color: var(--accent);
  cursor: pointer;
  user-select: none;
}
.substep-toggle:hover { text-decoration: underline; }

/* Tool badge inside substeps */
.tool-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: .7rem;
  font-family: var(--mono);
  font-weight: 600;
  margin-left: 4px;
}
.tool-badge.graph  { background: var(--accent-bg); color: var(--accent); }
.tool-badge.vector { background: var(--purple-bg); color: var(--purple); }
.tool-badge.sql    { background: var(--amber-bg);  color: var(--amber);  }

/* ═══════════════════════════════════════════════════════════
   Final Answer Card
   ═══════════════════════════════════════════════════════════ */
.answer-card {
  background: var(--surface);
  border: 1px solid var(--green);
  border-radius: var(--radius);
  padding: 22px;
  margin-top: 20px;
  animation: fadeSlide .4s ease;
  display: none;
}
.answer-card.visible { display: block; }

.answer-card h3 {
  color: var(--green);
  font-size: .82rem;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.answer-card .answer-text {
  font-size: .9rem; line-height: 1.75; white-space: pre-wrap;
}
.answer-card .answer-meta {
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: .76rem; color: var(--text-dim);
  display: flex; gap: 24px;
}
.answer-card .answer-meta span strong { color: var(--text); }

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="app">

  <header>
    <h1><span>KG Inference Agent</span> — IndiGo Airlines</h1>
    <p>Unified ontology over Knowledge Graph &middot; Document Embeddings &middot; Structured DB</p>
  </header>

  <div class="input-area">
    <input type="text" id="queryInput" placeholder="Ask a question about IndiGo Airlines data..."
           autocomplete="off" />
    <button class="btn" id="askBtn" onclick="submitQuestion()">Ask Agent</button>
  </div>

  <div class="samples">
    <button onclick="fillSample(this)">For every supplier whose rating was downgraded in the Q3 quality review, find their contracted parts, the assembly those parts belong to, and the aircraft model affected. Cross-reference with any customer complaints mentioning those same components.</button>
    <button onclick="fillSample(this)">Trace the full supply chain path from Pratt & Whitney (the supplier) to every aircraft model they supply, showing each intermediate step (part → assembly → product). For each aircraft model, summarize any engine-related issues mentioned in the unstructured quality reviews</button>
    <button onclick="fillSample(this)">The database lists Honeywell Aerospace with a rating of 4.7, but the quality review mentions their rating was downgraded to 4.3 due to brake disc issues. Identify all such discrepancies between the structured supplier ratings and the ratings mentioned in the unstructured text. What is the root cause for each discrepancy?</button>
    <button onclick="fillSample(this)">The customer feedback report shows lavatory issues increased 32.8% and cabin air quality complaints increased 41.9% from Q2 to Q3. Using the ontology, identify which specific suppliers and parts are involved in these complaint categories, and check if those suppliers/parts appear in the quality review with any known issues</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="status-bar" id="statusBar">
      <div class="dot"></div>
      <span id="statusText">Initializing...</span>
      <span class="elapsed" id="elapsed">0.0s</span>
    </div>
    <div id="steps"></div>
  </div>

  <div class="answer-card" id="answerCard">
    <h3>&#x2714;&#xFE0F; Final Answer</h3>
    <div class="answer-text" id="answerText"></div>
    <div class="answer-meta">
      <span><strong id="metaSteps">0</strong> tool calls</span>
      <span><strong id="metaTime">0.0</strong>s elapsed</span>
      <span><strong id="metaIter">0</strong> iterations</span>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════════
   Hierarchical Iteration UI — groups thought/action/observation
   into collapsible per-iteration cards
   ══════════════════════════════════════════════════════════════ */

const $ = s => document.querySelector(s);
let startTime = 0, timerInterval = null, eventSource = null;
let stepCount = 0;

/* Iteration state: track current iteration card & its body */
const iterations = {};          // { iterNum: { card, body, toolName, complete } }
let currentIter = 0;

function getOrCreateIteration(num) {
  if (iterations[num]) return iterations[num];

  const card = document.createElement('div');
  card.className = 'iter-card running';
  card.dataset.iter = num;

  const header = document.createElement('div');
  header.className = 'iter-header';

  const numEl = document.createElement('div');
  numEl.className = 'iter-number';
  numEl.textContent = num;

  const info = document.createElement('div');
  info.className = 'iter-info';

  const title = document.createElement('div');
  title.className = 'iter-title';
  title.textContent = `Step ${num}`;

  const summary = document.createElement('div');
  summary.className = 'iter-summary';
  summary.textContent = 'Thinking...';

  info.appendChild(title);
  info.appendChild(summary);

  const pills = document.createElement('div');
  pills.className = 'iter-pills';

  const chevron = document.createElement('span');
  chevron.className = 'iter-chevron';
  chevron.innerHTML = '&#x25BC;';

  header.appendChild(numEl);
  header.appendChild(info);
  header.appendChild(pills);
  header.appendChild(chevron);

  header.onclick = () => card.classList.toggle('open');

  const body = document.createElement('div');
  body.className = 'iter-body';

  card.appendChild(header);
  card.appendChild(body);
  $('#steps').appendChild(card);

  // Auto-expand newest, collapse previous
  if (currentIter && iterations[currentIter]) {
    iterations[currentIter].card.classList.remove('open', 'running');
    iterations[currentIter].card.classList.add('complete');
  }
  card.classList.add('open');
  currentIter = num;

  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  iterations[num] = { card, body, pills, summary, title, toolName: null, complete: false };
  return iterations[num];
}

function addSubstep(iter, type, content, detailHtml) {
  const el = document.createElement('div');
  el.className = `substep ${type}`;

  const tag = document.createElement('div');
  tag.className = 'substep-tag';
  tag.textContent = type === 'thought' ? 'Thought' :
                    type === 'action'  ? 'Action' :
                    type === 'observe' ? 'Observation' : 'Error';
  el.appendChild(tag);

  // Short preview line
  const truncated = content.length > 200 ? content.substring(0, 200) + '...' : content;
  const needsExpand = content.length > 200 || detailHtml;

  const preview = document.createElement('div');
  preview.className = 'substep-text substep-preview';
  preview.textContent = truncated;
  el.appendChild(preview);

  if (needsExpand) {
    const detail = document.createElement('div');
    detail.className = 'substep-detail';
    if (detailHtml) {
      detail.innerHTML = detailHtml;
    } else {
      detail.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
    }
    el.appendChild(detail);

    const toggle = document.createElement('span');
    toggle.className = 'substep-toggle';
    toggle.textContent = 'Show more';
    toggle.onclick = () => {
      const isOpen = el.classList.toggle('detail-open');
      toggle.textContent = isOpen ? 'Show less' : 'Show more';
    };
    el.appendChild(toggle);

    preview.onclick = () => {
      el.classList.add('detail-open');
      toggle.textContent = 'Show less';
    };
  }

  iter.body.appendChild(el);
}

/* ── Fill sample ───────────────────────────────────────────── */
function fillSample(btn) {
  $('#queryInput').value = btn.textContent;
  $('#queryInput').focus();
}

/* ── Submit ────────────────────────────────────────────────── */
function submitQuestion() {
  const q = $('#queryInput').value.trim();
  if (!q) return;

  resetUI();
  $('#timeline').classList.add('visible');
  $('#askBtn').disabled = true;
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 100);

  const url = `/api/ask?q=${encodeURIComponent(q)}`;
  eventSource = new EventSource(url);

  eventSource.addEventListener('status', e => {
    const d = JSON.parse(e.data);
    $('#statusText').textContent = d.message;
  });

  eventSource.addEventListener('thought', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);
    iter.summary.textContent = d.thought.substring(0, 120) + (d.thought.length > 120 ? '...' : '');
    addSubstep(iter, 'thought', d.thought, null);
  });

  eventSource.addEventListener('action', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);
    iter.toolName = d.tool;
    stepCount++;

    // Add pill to header
    const pillClass = toolBadgeClass(d.tool);
    const pill = document.createElement('span');
    pill.className = `pill ${pillClass}`;
    pill.textContent = d.tool.replace(/_tool$/, '').replace(/_/g, ' ');
    iter.pills.appendChild(pill);

    // Update title with tool info
    iter.title.innerHTML = `Step ${d.iteration} <span class="tool-badge ${pillClass}">${escapeHtml(d.tool)}</span>`;

    const inputStr = JSON.stringify(d.action_input, null, 2);
    const detailHtml = `<pre>${syntaxHighlight(inputStr)}</pre>`;
    addSubstep(iter, 'action', `${d.tool} → ${JSON.stringify(d.action_input)}`, detailHtml);
  });

  eventSource.addEventListener('observation', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);

    let formatted = d.observation;
    try { formatted = JSON.stringify(JSON.parse(d.observation), null, 2); } catch(_){}
    const detailHtml = `<pre>${escapeHtml(formatted)}</pre>`;
    addSubstep(iter, 'observe', d.observation, detailHtml);

    // Mark this iteration complete
    iter.card.classList.remove('running');
    iter.card.classList.add('complete');
    iter.complete = true;
  });

  eventSource.addEventListener('parse_error', e => {
    const d = JSON.parse(e.data);
    const iter = getOrCreateIteration(d.iteration);

    const pill = document.createElement('span');
    pill.className = 'pill error';
    pill.textContent = 'parse error';
    iter.pills.appendChild(pill);

    addSubstep(iter, 'error', d.error, null);
  });

  eventSource.addEventListener('error', e => {
    try {
      const d = JSON.parse(e.data);
      addSubstep(getOrCreateIteration(currentIter || 1), 'error', d.message, null);
    } catch(_){}
  });

  eventSource.addEventListener('final_answer', e => {
    const d = JSON.parse(e.data);
    // Collapse the last iteration
    if (currentIter && iterations[currentIter]) {
      iterations[currentIter].card.classList.remove('open', 'running');
      iterations[currentIter].card.classList.add('complete');
    }
    showAnswer(d.answer, d.total_steps, d.iterations);
  });

  eventSource.addEventListener('done', () => finish());
  eventSource.onerror = () => finish();
}

/* ── Helpers ───────────────────────────────────────────────── */
function resetUI() {
  $('#steps').innerHTML = '';
  $('#answerCard').classList.remove('visible');
  $('#statusBar').classList.remove('done');
  $('#statusText').textContent = 'Initializing...';
  $('#elapsed').textContent = '0.0s';
  stepCount = 0;
  currentIter = 0;
  Object.keys(iterations).forEach(k => delete iterations[k]);
  if (timerInterval) clearInterval(timerInterval);
  if (eventSource) { eventSource.close(); eventSource = null; }
}

function updateTimer() {
  $('#elapsed').textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
}

function finish() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  clearInterval(timerInterval);
  updateTimer();
  $('#statusBar').classList.add('done');
  $('#statusText').textContent = 'Complete';
  $('#askBtn').disabled = false;
}

function showAnswer(text, steps, iters) {
  $('#answerText').textContent = text;
  $('#metaSteps').textContent = steps;
  $('#metaTime').textContent = ((Date.now() - startTime) / 1000).toFixed(1);
  $('#metaIter').textContent = iters;
  $('#answerCard').classList.add('visible');
  setTimeout(() => $('#answerCard').scrollIntoView({ behavior: 'smooth', block: 'end' }), 150);
}

function toolBadgeClass(tool) {
  if (tool.includes('graph'))  return 'graph';
  if (tool.includes('vector')) return 'vector';
  if (tool.includes('sql'))    return 'sql';
  return '';
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function syntaxHighlight(json) {
  return escapeHtml(json)
    .replace(/"([^"]+)":/g, '<span style="color:var(--cyan)">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span style="color:var(--green)">"$1"</span>');
}

$('#queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !$('#askBtn').disabled) submitQuestion();
});
</script>

</body>
</html>
